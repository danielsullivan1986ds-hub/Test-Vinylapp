<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vinyl App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <h2>Home</h2>
    <div id="stats"></div>
  </div>

  <!-- BROWSE -->
  <div id="page-browse" class="page">
    <h2>Browse</h2>
    <div id="browseList"></div>
  </div>

  <!-- TRACKS -->
  <div id="page-tracks" class="page">
    <h2>Tracks</h2>
    <input id="trackFilter" placeholder="Filter tracks...">
    <div id="trackList"></div>
  </div>

  <!-- SEARCH -->
  <div id="page-search" class="page">
    <h2>Search</h2>
    <input id="searchInput" placeholder="Search vinyls or tracks...">
    <div id="searchResults"></div>
  </div>

  <!-- NAVIGATION -->
  <nav class="bottom-nav">
    <button data-page="home">Home</button>

    <!-- ADD BUTTON (opens form + returns home) -->
    <button onclick="
      window.open('https://docs.google.com/forms/d/e/1FAIpQLSdJYOzlQQZk_lM3pAbCEqqzl7HqjMNH81Y6eTJwNVgq-k6SmQ/viewform', '_blank');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-home').classList.add('active');
    ">
      Add
    </button>

    <button data-page="browse">Browse</button>
    <button data-page="tracks">Tracks</button>
    <button data-page="search">Search</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
